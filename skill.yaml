# OpenPAVE Browser Skill
# Vision-driven browser automation via Puppeteer + LocateAnything-3B

name: browser-use
version: 1.3.1
description: >
  Control a web browser through Puppeteer (precise selector-based control)
  + LocateAnything-3B (visual grounding fallback). Bundled Chromium — no
  Chrome installation required. Navigate pages, fill forms, click elements,
  type text, extract DOM, take screenshots, and execute JavaScript — all
  from PAVE agent commands.

  Stealth mode is ON by default — uses puppeteer-extra-plugin-stealth to
  mask navigator.webdriver, chrome.runtime, CDP traces, and other bot
  detection signals. Set env PUPPETEER_STEALTH=0 to disable.

  OCR is ON by default on all action commands — each response includes the
  extracted page text. Use --no-ocr to disable for faster responses.

author:
  name: cnrai
  url: https://github.com/cnrai

license: MIT
homepage: https://github.com/cnrai/openpave-browser
repository: cnrai/openpave-browser

# Execution pattern: host (needs OS-level access for Chrome + pyautogui)
pattern: host
entrypoint: index.js

# Available commands
commands:
  - name: screenshot
    description: Capture page screenshot
    args: []
    options:
      - --full
      - --output <path>
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: dom
    description: Extract interactive DOM elements with CSS selectors
    args: []
    options:
      - --text-only
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: navigate
    description: Navigate to URL
    args:
      - <url>
    options:
      - --wait <seconds>
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: dom_type
    description: Type text into element by CSS selector (Puppeteer)
    args:
      - <selector>
      - <text>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: dom_click
    description: Click element by CSS selector (Puppeteer)
    args:
      - <selector>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: click
    description: Click at screen coordinates (pyautogui)
    args:
      - <x>
      - <y>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: type
    description: Type at screen coordinates (pyautogui fallback)
    args:
      - <x>
      - <y>
      - <text>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: find
    description: Locate element via LocateAnything visual grounding
    args:
      - <description>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: key
    description: Press key combo
    args:
      - <combo>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: scroll
    description: Scroll page up or down
    args:
      - <up|down>
    options:
      - --amount <steps>
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: eval
    description: Execute JavaScript in page
    args:
      - <code>
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: url
    description: Get current page URL and title
    args: []
    options:
      - --no-ocr
      - --ocr-wait <seconds>
      - --ocr-timeout <seconds>

  - name: focus
    description: Focus Chrome window
    args: []

  - name: wait
    description: Sleep for N seconds
    args:
      - <seconds>

  - name: check
    description: Verify all components are ready
    args: []

# Environment variables for remote mode (all optional)
env:
  optional:
    - BROWSER_USE_HOST
    - BROWSER_USE_USER
    - BROWSER_USE_PYTHON
    - BROWSER_USE_REMOTE_SCRIPT
    - LOCATE_ANYTHING_PATH

# Platform compatibility (bundled Chromium, no Chrome installation required)
platforms:
  - darwin
  - linux

engines:
  node: ">=16.0.0"
  python: ">=3.9"

# Metadata
keywords:
  - browser
  - automation
  - puppeteer
  - locateanything
  - vision
  - web
  - scraping
  - rpa

category: productivity
icon: "\U0001F310"
